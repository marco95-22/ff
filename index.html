<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FF Anwesenheit</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #1a1a1a; }

.header {
  position: sticky; top: 0; z-index: 10;
  background: #fff;
  padding: 12px 16px 10px;
  border-bottom: 1px solid #e0e0e0;
}
.stats {
  display: flex; gap: 8px; margin-bottom: 10px;
}
.stat {
  flex: 1; background: #f5f5f5; border-radius: 10px;
  padding: 8px 10px; text-align: center;
}
.stat-num { font-size: 22px; font-weight: 600; color: #1a1a1a; }
.stat-num.green { color: #1a9e5a; }
.stat-label { font-size: 11px; color: #888; margin-top: 1px; }

#search {
  width: 100%; padding: 9px 14px;
  border: 1px solid #ddd; border-radius: 10px;
  font-size: 16px; background: #f5f5f5; color: #1a1a1a;
  -webkit-appearance: none;
}
#search:focus { outline: none; border-color: #1a9e5a; background: #fff; }

.list { padding-bottom: 160px; }

.person {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 16px;
  background: #fff;
  border-bottom: 1px solid #ececec;
  cursor: pointer;
  -webkit-user-select: none; user-select: none;
}
.person:active { background: #f0f0f0; }
.person.anwesend { background: #edfaf3; }
.person.anwesend:active { background: #d0f0e0; }

.check {
  width: 28px; height: 28px; flex-shrink: 0;
  border-radius: 50%;
  border: 2px solid #ccc;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, border-color 0.15s;
}
.person.anwesend .check {
  background: #1a9e5a; border-color: #1a9e5a;
}
.check svg { display: none; }
.person.anwesend .check svg { display: block; }

.info { flex: 1; min-width: 0; }
.name { font-size: 15px; color: #1a1a1a; }
.person.anwesend .name { font-weight: 600; color: #0d6e3a; }

.nr {
  font-size: 13px; color: #999;
  background: #f0f0f0; border-radius: 6px;
  padding: 2px 8px; flex-shrink: 0;
}
.person.anwesend .nr {
  background: #c8edd9; color: #0d6e3a;
}

.no-results { padding: 2rem; text-align: center; color: #999; font-size: 14px; }

.einsatz {
  background: #fff;
  border-bottom: 1px solid #e0e0e0;
  padding: 12px 16px;
}
.einsatz-title {
  font-size: 11px; font-weight: 600; color: #888;
  text-transform: uppercase; letter-spacing: 0.05em;
  margin-bottom: 10px;
}
.einsatz-row {
  display: flex; gap: 8px; margin-bottom: 8px;
}
.einsatz-row:last-child { margin-bottom: 0; }
.einsatz-field {
  display: flex; flex-direction: column; flex: 1;
}
.einsatz-field label {
  font-size: 11px; color: #888; margin-bottom: 3px;
}
.einsatz-field input, .einsatz-field textarea {
  padding: 8px 10px;
  border: 1px solid #ddd; border-radius: 8px;
  font-size: 15px; background: #f5f5f5; color: #1a1a1a;
  -webkit-appearance: none; font-family: -apple-system, sans-serif;
}
.einsatz-field input:focus, .einsatz-field textarea:focus {
  outline: none; border-color: #1a9e5a; background: #fff;
}
.einsatz-field textarea {
  resize: none; height: 60px; line-height: 1.4;
}

.footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff; border-top: 1px solid #e0e0e0;
  padding: 10px 16px 20px;
}
.output-box {
  background: #f5f5f5; border: 1px solid #ddd; border-radius: 10px;
  padding: 10px 12px; font-family: monospace; font-size: 13px;
  color: #1a1a1a; word-break: break-all;
  margin-bottom: 8px; display: none; cursor: pointer;
}
.copy-hint { font-size: 11px; color: #888; margin-bottom: 6px; display: none; }
.export-btn {
  width: 100%; padding: 13px;
  background: #1a9e5a; color: #fff;
  border: none; border-radius: 12px;
  font-size: 16px; font-weight: 600; cursor: pointer;
  -webkit-appearance: none;
}
.export-btn:active { background: #0d6e3a; }
.export-btn:disabled { background: #ccc; color: #fff; }
.reset-btn {
  width: 100%; padding: 9px; margin-top: 6px;
  background: none; border: 1px solid #ddd; border-radius: 10px;
  font-size: 13px; color: #888; cursor: pointer;
  -webkit-appearance: none;
}
.reset-btn:active { background: #f0f0f0; }
</style>
</head>
<body>

<div class="header">
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="total-count">0</div>
      <div class="stat-label">Mitglieder</div>
    </div>
    <div class="stat">
      <div class="stat-num green" id="present-count">0</div>
      <div class="stat-label">Anwesend</div>
    </div>
  </div>
  <input type="search" id="search" placeholder="Name oder Nummer suchen..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
</div>

<div class="einsatz">
  <div class="einsatz-title">Einsatz / Übung</div>
  <div class="einsatz-row">
    <div class="einsatz-field">
      <label for="datum">Datum</label>
      <input type="date" id="datum" oninput="saveEinsatz()">
    </div>
  </div>
  <div class="einsatz-row">
    <div class="einsatz-field">
      <label for="von">Von</label>
      <input type="time" id="von" oninput="saveEinsatz()">
    </div>
    <div class="einsatz-field">
      <label for="bis">Bis</label>
      <input type="time" id="bis" oninput="saveEinsatz()">
    </div>
  </div>
  <div class="einsatz-row">
    <div class="einsatz-field">
      <label for="ort">Ort</label>
      <input type="text" id="ort" placeholder="z.B. Gerätehaus" autocorrect="off" oninput="saveEinsatz()">
    </div>
  </div>
  <div class="einsatz-row">
    <div class="einsatz-field">
      <label for="notizen">Notizen</label>
      <textarea id="notizen" placeholder="Bemerkungen..." oninput="saveEinsatz()"></textarea>
    </div>
  </div>
</div>

<div class="list" id="list"></div>

<div class="footer">
  <div class="output-box" id="output-box" onclick="copyOutput()"></div>
  <div class="copy-hint" id="copy-hint">Antippen zum Kopieren</div>
  <button class="export-btn" id="export-btn" onclick="exportNummern()" disabled>Standesummern exportieren</button>
  <button class="reset-btn" onclick="resetAll()">Auswahl zurücksetzen</button>
</div>

<script>
var members = [
  {nr:200,vorname:"Norbert",nachname:"Amraser"},

  {nr:278,vorname:"Stefan",nachname:"Webhofer"},
  {nr:292,vorname:"Jurgen",nachname:"Weiler"},
  {nr:289,vorname:"Bernd",nachname:"Wimmer"}
];

members.sort(function(a,b){
  if (a.nachname < b.nachname) return -1;
  if (a.nachname > b.nachname) return 1;
  if (a.vorname < b.vorname) return -1;
  if (a.vorname > b.vorname) return 1;
  return 0;
});

var present = {};
try {
  var saved = localStorage.getItem('ff_anwesenheit');
  if (saved) present = JSON.parse(saved);
} catch(e) {}

var filtered = members.slice();

function saveState() {
  try { localStorage.setItem('ff_anwesenheit', JSON.stringify(present)); } catch(e) {}
}

function saveEinsatz() {
  var e = {
    datum: document.getElementById('datum').value,
    von: document.getElementById('von').value,
    bis: document.getElementById('bis').value,
    ort: document.getElementById('ort').value,
    notizen: document.getElementById('notizen').value
  };
  try { localStorage.setItem('ff_einsatz', JSON.stringify(e)); } catch(e) {}
}

function loadEinsatz() {
  try {
    var saved = localStorage.getItem('ff_einsatz');
    if (!saved) return;
    var e = JSON.parse(saved);
    if (e.datum) document.getElementById('datum').value = e.datum;
    if (e.von) document.getElementById('von').value = e.von;
    if (e.bis) document.getElementById('bis').value = e.bis;
    if (e.ort) document.getElementById('ort').value = e.ort;
    if (e.notizen) document.getElementById('notizen').value = e.notizen;
  } catch(e) {}
}

function render() {
  var list = document.getElementById('list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">Keine Ergebnisse</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var m = filtered[i];
    var key = String(m.nr);
    var isP = present[key] === true;
    html += '<div class="person' + (isP ? ' anwesend' : '') + '" onclick="toggle(\'' + key + '\')">';
    html += '<div class="check">';
    html += '<svg width="14" height="11" viewBox="0 0 14 11" fill="none"><polyline points="1,5.5 5,9.5 13,1" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    html += '</div>';
    html += '<div class="info"><div class="name">' + m.nachname + ' ' + m.vorname + '</div></div>';
    html += '<div class="nr">' + m.nr + '</div>';
    html += '</div>';
  }
  list.innerHTML = html;
  document.getElementById('total-count').textContent = members.length;
  document.getElementById('present-count').textContent = Object.keys(present).length;
}

function toggle(key) {
  if (present[key]) { delete present[key]; } else { present[key] = true; }
  saveState();
  render();
  document.getElementById('export-btn').disabled = Object.keys(present).length === 0;
  document.getElementById('output-box').style.display = 'none';
  document.getElementById('copy-hint').style.display = 'none';
}

function exportNummern() {
  var nrs = [];
  for (var i = 0; i < members.length; i++) {
    if (present[String(members[i].nr)]) nrs.push(members[i].nr);
  }
  var datum = document.getElementById('datum').value;
  var von = document.getElementById('von').value;
  var bis = document.getElementById('bis').value;
  var ort = document.getElementById('ort').value;
  var notizen = document.getElementById('notizen').value;
  var lines = [];
  if (datum) lines.push('Datum: ' + datum);
  if (von || bis) lines.push('Zeit: ' + (von || '–') + ' – ' + (bis || '–'));
  if (ort) lines.push('Ort: ' + ort);
  if (notizen) lines.push('Notizen: ' + notizen);
  lines.push('Anwesend (' + nrs.length + '): ' + nrs.join(', '));
  var text = lines.join('\n');
  var box = document.getElementById('output-box');
  box.textContent = text;
  box.style.display = 'block';
  document.getElementById('copy-hint').style.display = 'block';
}

function copyOutput() {
  var text = document.getElementById('output-box').textContent;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      var box = document.getElementById('output-box');
      var orig = box.textContent;
      box.textContent = 'Kopiert!';
      setTimeout(function(){ box.textContent = orig; }, 1500);
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var box = document.getElementById('output-box');
    var orig = box.textContent;
    box.textContent = 'Kopiert!';
    setTimeout(function(){ box.textContent = orig; }, 1500);
  }
}

function resetAll() {
  present = {};
  saveState();
  document.getElementById('datum').value = '';
  document.getElementById('von').value = '';
  document.getElementById('bis').value = '';
  document.getElementById('ort').value = '';
  document.getElementById('notizen').value = '';
  try { localStorage.removeItem('ff_einsatz'); } catch(e) {}  document.getElementById('search').value = '';
  filtered = members.slice();
  document.getElementById('output-box').style.display = 'none';
  document.getElementById('copy-hint').style.display = 'none';
  document.getElementById('export-btn').disabled = true;
  render();
}

document.getElementById('search').addEventListener('input', function(e) {
  var q = e.target.value.toLowerCase();
  if (!q) { filtered = members.slice(); }
  else {
    filtered = [];
    for (var i = 0; i < members.length; i++) {
      if ((members[i].nachname + ' ' + members[i].vorname).toLowerCase().indexOf(q) !== -1 || members[i].vorname.toLowerCase().indexOf(q) !== -1 || String(members[i].nr).indexOf(q) !== -1) {
        filtered.push(members[i]);
      }
    }
  }
  render();
});

render();
loadEinsatz();
</script>
</body>
</html>
